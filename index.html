<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HA Aurora Studio v12 - Modular</title>
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <!-- Nunjucks for Jinja2 parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nunjucks/3.2.4/nunjucks.min.js"></script>
</head>
<body>

<div id="sidebar">
    <div id="toolbar">
        <div id="error-msg"></div>
        <button id="toggle-btn" class="btn-start">▶ Animation Starten</button>
        
        <div id="color-tool">
            <div class="color-tabs">
                <div class="color-tab active" data-mode="rgb">RGB</div>
                <div class="color-tab" data-mode="xy">XY</div>
                <div class="color-tab" data-mode="hs">HS</div>
            </div>
            <div class="color-inputs">
                <input type="color" id="picker-color" value="#00ffcc">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <div class="input-group" id="group-rgb">
                        <label>RGB</label>
                        <input type="number" id="in-r" min="0" max="255" value="0">
                        <input type="number" id="in-g" min="0" max="255" value="255">
                        <input type="number" id="in-b" min="0" max="255" value="204">
                    </div>
                    <div class="input-group" id="group-xy" style="display:none;">
                        <label>XY</label>
                        <input type="number" id="in-x" step="0.001" value="0.171">
                        <input type="number" id="in-y" step="0.001" value="0.342">
                    </div>
                    <div class="input-group" id="group-hs" style="display:none;">
                        <label>HS</label>
                        <input type="number" id="in-h" min="0" max="360" value="168">
                        <input type="number" id="in-s" min="0" max="100" value="100">
                    </div>
                </div>
            </div>
            <div class="snippets-grid">
                <div class="code-snippet" id="btn-insert-color">In Editor einfügen</div>
            </div>
            <div class="color-favorites" id="favorites-container">
                <button class="favorite-add" id="btn-add-favorite" title="Aktuelle Farbe speichern">+</button>
                <!-- Favoriten werden hier eingefügt -->
            </div>
        </div>
    </div>
    <textarea id="code-editor"></textarea>
    <div id="sidebar-footer" style="padding: 10px; background: #1e1e24; display: flex; gap: 10px; border-top: 1px solid #444; flex-shrink: 0;">
        <button id="btn-copy-code" class="btn-secondary" style="flex: 1;">📋 Kopieren</button>
        <button id="btn-save-code" class="btn-secondary" style="flex: 1;">💾 Speichern (.yaml)</button>
    </div>
</div>

<div id="resizer"></div>

<div id="preview-side">
    <div id="preview-toolbar">
        <div style="display: flex; gap: 15px; align-items: center;">
            <span style="font-size: 12px; color: #888;">Live Preview</span>
            <select id="sel-color-curve" style="background: #1e1e24; color: #fff; border: 1px solid #444; padding: 2px 5px; font-size: 11px; border-radius: 3px;">
                <option value="linear">LED-Kurve: Linear</option>
                <option value="gamma22">LED-Kurve: Gamma 2.2 (Standard)</option>
                <option value="gamma28">LED-Kurve: Gamma 2.8 (Real LED)</option>
                <option value="cie">LED-Kurve: CIE L* (Perceptual)</option>
            </select>
        </div>
        <button id="btn-toggle-entities" class="btn-secondary">Entitäten Browser</button>
    </div>
    <div id="room"></div>
    
    <!-- Entity Browser Overlay -->
    <div id="entity-browser">
        <div class="browser-header">
            <span class="browser-title">Umgebung</span>
            <button class="close-btn" id="btn-close-entities">&times;</button>
        </div>
        <div class="browser-section-title">Lichter & Gruppen</div>
        <div class="entity-list" id="entity-list">
            <!-- Entitäten werden hier generiert -->
        </div>
        <div class="browser-section-title" style="margin-top: auto;">Variablen</div>
        <div class="entity-list" id="variable-list" style="max-height: 40%; min-height: 150px; background: #1a1a1a;">
            <!-- Variablen werden hier generiert -->
        </div>
    </div>
</div>

<!-- Main Application Module -->
<script type="module" src="js/app.js"></script>

</body>
</html>
