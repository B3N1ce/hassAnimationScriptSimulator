<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>HA Aurora Studio v12 - Modular</title>
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <!-- Nunjucks for Jinja2 parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nunjucks/3.2.4/nunjucks.min.js"></script>
</head>
<body>

<div id="sidebar">
    <div id="toolbar">
        <div id="error-msg"></div>
        <button id="toggle-btn" class="btn-start">▶ Animation Starten</button>
        
        <div id="color-tool">
            <div class="color-tabs">
                <div class="color-tab active" data-mode="rgb">RGB</div>
                <div class="color-tab" data-mode="xy">XY</div>
                <div class="color-tab" data-mode="hs">HS</div>
            </div>
            <div class="color-inputs">
                <input type="color" id="picker-color" value="#00ffcc">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <div class="input-group" id="group-rgb">
                        <label>RGB</label>
                        <input type="number" id="in-r" min="0" max="255" value="0">
                        <input type="number" id="in-g" min="0" max="255" value="255">
                        <input type="number" id="in-b" min="0" max="255" value="204">
                    </div>
                    <div class="input-group" id="group-xy" style="display:none;">
                        <label>XY</label>
                        <input type="number" id="in-x" step="0.001" value="0.171">
                        <input type="number" id="in-y" step="0.001" value="0.342">
                    </div>
                    <div class="input-group" id="group-hs" style="display:none;">
                        <label>HS</label>
                        <input type="number" id="in-h" min="0" max="360" value="168">
                        <input type="number" id="in-s" min="0" max="100" value="100">
                    </div>
                </div>
            </div>
            <div class="snippets-grid">
                <div class="code-snippet" id="btn-insert-color">In Editor einfügen</div>
            </div>
            <div class="color-favorites" id="favorites-container">
                <button class="favorite-add" id="btn-add-favorite" title="Aktuelle Farbe speichern">+</button>
                <!-- Favoriten werden hier eingefügt -->
            </div>
        </div>
    </div>
    <textarea id="code-editor"></textarea>
</div>

<div id="resizer"></div>

<div id="preview-side">
    <div id="preview-toolbar">
        <span style="font-size: 12px; color: #888;">Live Preview</span>
        <button id="btn-toggle-entities" class="btn-secondary">Entitäten Browser</button>
    </div>
    <div id="room"></div>
    
    <!-- Entity Browser Overlay -->
    <div id="entity-browser">
        <div class="browser-header">
            <span class="browser-title">Entitäten</span>
            <button class="close-btn" id="btn-close-entities">&times;</button>
        </div>
        <div class="entity-list" id="entity-list">
            <!-- Entitäten werden hier generiert -->
        </div>
    </div>
</div>

<!-- Main Application Module -->
<script type="module" src="js/app.js"></script>

</body>
</html>
