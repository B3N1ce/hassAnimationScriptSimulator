<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Studio</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23282a36' stroke='%2350fa7b' stroke-width='6'/><circle cx='50' cy='50' r='18' fill='%2350fa7b' opacity='0.8'/><circle cx='50' cy='50' r='28' fill='none' stroke='%23bd93f9' stroke-width='3' stroke-dasharray='8 6'/></svg>"
        type="image/svg+xml">
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <!-- Nunjucks for Jinja2 parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nunjucks/3.2.4/nunjucks.min.js"></script>
</head>

<body>

    <!-- Global Header -->
    <header id="global-header">
        <div class="header-logo-container">
            <div class="header-logo">Aurora Studio</div>
            <div class="header-subheadline">Licht-Animationen entwerfen und simulieren – maßgeschneidert für Home Assistant.</div>
        </div>
        <div class="header-actions">
            <button id="btn-validate" class="btn-header btn-primary">✔ YAML Prüfen</button>
            <div class="playback-controls">
                <button id="toggle-btn" class="btn-start">▶ Starten</button>
                <button id="pause-btn" class="btn-start btn-pause" style="display: none;">⏸ Pause</button>
                <button id="stop-btn" class="btn-start btn-stop" style="display: none;">⏹ Stopp</button>
            </div>
            <button id="btn-notifications" class="btn-header-icon" style="position: relative;" title="System Log">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
                <span id="notif-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <main id="app-container">

        <!-- PANEL 1: Editor -->
        <section id="panel-editor" class="panel active">
            <div class="panel-header">
                <div class="panel-tabs">
                    <div class="panel-tab active">YAML Skript</div>
                </div>
                <div class="editor-actions">
                    <button id="btn-copy-code" class="btn-editor-icon" title="Code kopieren">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                    </button>
                    <button id="btn-save-code" class="btn-editor-icon" title="Als .yaml speichern">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="panel-content">
                <textarea id="code-editor"></textarea>
            </div>
        </section>

        <div class="resizer" id="resizer-left"></div>

        <!-- PANEL 2: Preview (Room) -->
        <section id="panel-preview" class="panel">
            <div class="panel-header">
                <span class="panel-title">Simulation</span>
                <div class="panel-tools">
                    <select id="sel-color-curve" class="dropdown-small">
                        <option value="linear">Linear (Raw)</option>
                        <option value="gamma22">Gamma 2.2</option>
                        <option value="gamma28">Gamma 2.8</option>
                        <option value="cie">CIE L* (Perceptual)</option>
                    </select>
                    <button id="btn-toggle-labels" class="btn-editor-icon" title="Labels ein/ausblenden">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 7 4 4 20 4 20 7" />
                            <line x1="9" y1="20" x2="15" y2="20" />
                            <line x1="12" y1="4" x2="12" y2="20" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="panel-content" id="room">
                <!-- Lamps will be injected here -->
            </div>
        </section>

        <div class="resizer" id="resizer-right"></div>

        <!-- PANEL 3: Inspector -->
        <section id="panel-inspector" class="panel">
            <div class="panel-header">
                <span class="panel-title">Inspector</span>
            </div>

            <div class="panel-content scrollable">
                <!-- Color Picker -->
                <div class="inspector-section">
                    <div class="section-title">Color Picker</div>
                    <div id="color-tool">
                        <div class="color-tabs">
                            <div class="color-tab active" data-mode="rgb">RGB</div>
                            <div class="color-tab" data-mode="xy">XY</div>
                            <div class="color-tab" data-mode="hs">HS</div>
                        </div>
                        <div class="color-inputs">
                            <input type="color" id="picker-color" value="#00ffcc">
                            <div style="display: flex; flex-direction: column; gap: 5px;">
                                <div class="input-group" id="group-rgb">
                                    <label>RGB</label>
                                    <input type="number" id="in-r" min="0" max="255" value="0">
                                    <input type="number" id="in-g" min="0" max="255" value="255">
                                    <input type="number" id="in-b" min="0" max="255" value="204">
                                </div>
                                <div class="input-group" id="group-xy" style="display:none;">
                                    <label>XY</label>
                                    <input type="number" id="in-x" step="0.001" value="0.171">
                                    <input type="number" id="in-y" step="0.001" value="0.342">
                                </div>
                                <div class="input-group" id="group-hs" style="display:none;">
                                    <label>HS</label>
                                    <input type="number" id="in-h" min="0" max="360" value="168">
                                    <input type="number" id="in-s" min="0" max="100" value="100">
                                </div>
                            </div>
                        </div>
                        <div class="snippets-grid">
                            <div class="code-snippet" id="btn-insert-color">In Editor einfügen</div>
                        </div>
                        <div class="color-favorites" id="favorites-container">
                            <button class="favorite-add" id="btn-add-favorite"
                                title="Aktuelle Farbe speichern">+</button>
                        </div>
                    </div>
                </div>

                <!-- Entities -->
                <div class="inspector-section">
                    <div class="section-title">Umgebung & Gruppen</div>
                    <div id="entity-list" class="entity-list"></div>
                </div>

                <!-- Variables -->
                <div class="inspector-section">
                    <div class="section-title">Globale Variablen</div>
                    <div id="variable-list" class="entity-list"></div>
                </div>
            </div>
        </section>

    </main>

    <!-- Mobile Tab Navigation -->
    <nav id="mobile-tabs">
        <button class="mobile-tab active" data-target="panel-editor">Editor</button>
        <button class="mobile-tab" data-target="panel-preview">Vorschau</button>
        <button class="mobile-tab" data-target="panel-inspector">Tools</button>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Notification Modal -->
    <div id="notif-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin: 0; font-size: 16px; color: #f8f8f2;">System Log</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="btn-clear-notifs" class="btn-secondary" style="padding: 4px 8px;">Alle löschen</button>
                    <button id="btn-close-notifs" class="close-btn" style="font-size: 20px;">&times;</button>
                </div>
            </div>
            <div id="notif-list" class="modal-body"></div>
        </div>
    </div>

    <!-- Main Application Module -->
    <script type="module" src="js/app.js"></script>

</body>

</html>
